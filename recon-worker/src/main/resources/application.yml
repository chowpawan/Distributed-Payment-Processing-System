server:
  port: 8082

spring:
  application:
    name: recon-worker
  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: ${DB_USER:payments}
    password: ${DB_PASSWORD:payments}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_recon_schema_history
    baseline-on-migrate: true
    baseline-version: 0

stripe:
  api-key: ${STRIPE_API_KEY:sk_test_placeholder}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true
