server:
  port: 8083

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: ${DB_USER:payments}
    password: ${DB_PASSWORD:payments}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_notification_schema_history

kafka:
  topics:
    payment-events: payment-events

notification:
  webhook:
    hmac-secret: ${WEBHOOK_HMAC_SECRET:default-secret-change-in-prod}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true
